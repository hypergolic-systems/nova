// Stock landing-leg override. Strips ONLY ModuleWheelDeployment —
// the rest of the wheel stack (Base / Suspension / Bogey / Damage /
// Lock) owns the foot collider, suspension physics, and damage
// model, which Nova does not reimplement. NovaLandingLegModule
// drives the deploy state, EC consumption, the staging gate, and
// wheelCollider on/off via wheelBase.InopSystems.
//
// Motor power scales with leg mass; deploy time matches stock visual
// cadence. Defaults: requires staging on (player can clear in editor),
// starts retracted on the launchpad. Animation clip name MUST match
// the part's actual clip — LT-1 uses "Deploy", LT-2 uses
// "newlandingleg", LT-5 uses "probeleg".

@PART[landingLeg1]
{
  !MODULE[ModuleWheelDeployment] {}
  MODULE
  {
    name = NovaLandingLegModule
    animationName   = Deploy
    motorPowerW     = 30
    deploySeconds   = 2
    deployThreshold = 1.0
    requiresStaging = true
    startsDeployed  = false
  }
}

@PART[landingLeg1-2]
{
  !MODULE[ModuleWheelDeployment] {}
  MODULE
  {
    name = NovaLandingLegModule
    animationName   = newlandingleg
    motorPowerW     = 80
    deploySeconds   = 3
    deployThreshold = 1.0
    requiresStaging = true
    startsDeployed  = false
  }
}

@PART[miniLandingLeg]
{
  !MODULE[ModuleWheelDeployment] {}
  MODULE
  {
    name = NovaLandingLegModule
    animationName   = probeleg
    motorPowerW     = 200
    deploySeconds   = 4
    deployThreshold = 1.0
    requiresStaging = true
    startsDeployed  = false
  }
}
