// Apollo-class single-stack PEM fuel cell. Sized for ~50 W/kg specific
// power (PRSD-style spaceflight-rated stack). At 2.5 kW continuous and
// 60% LHV efficiency (η × 120 MJ/kg H₂ = 72 MJ/kg electrical), the
// stoichiometric LH₂ + LOx mass-flow ratio of 1:8 maps to ~5×10⁻⁴ L/s
// LH₂ + ~2.3×10⁻⁴ L/s LOx via Nova's resource densities.
@PART[FuelCell]
{
  !MODULE[ModuleResourceConverter] {}

  MODULE {
    name = NovaFuelCellModule
    lh2Rate = 0.000496
    loxRate = 0.000231
    ecOutput = 2500
    // Internal manifold sized for ~33 min runtime per refill cycle.
    // Capacity is mix-L (LH₂ + LOx combined); the cell tracks per-
    // resource splits via lh2Rate / loxRate. Total volumetric draw at
    // full production = lh2Rate + loxRate ≈ 7.27e-4 L/s, and 1.466 /
    // 7.27e-4 ≈ 33 min. Refill draws from main tanks at 0.1466 mix-L/s
    // — envelope-friendly for GLOP, ~9 s top-up from 10%.
    manifoldCapacity = 1.466
    refillRate = 0.1466
  }
}
