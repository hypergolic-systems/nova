// Shuttle-class four-stack fuel cell array. Same 50 W/kg specific power
// as the single stack — a 240 kg unit produces ~12 kW continuous, with
// the same stoichiometric H₂:O₂ mass ratio scaled up.
@PART[FuelCellArray]
{
  !MODULE[ModuleResourceConverter] {}

  MODULE {
    name = NovaFuelCellModule
    lh2Rate = 0.002381
    loxRate = 0.001111
    ecOutput = 12000
    // Same ~33 min runtime + ~9 s refill cycle as the small cell;
    // capacity and refill rate scale 4× with the stack count. mix-L
    // capacity = 4 × 1.466. Refill rate = 4 × 0.1466.
    manifoldCapacity = 5.864
    refillRate = 0.5864
  }
}
