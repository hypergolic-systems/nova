@PART[MpoProbe]
{
  !RESOURCE[ElectricCharge] {}
  !MODULE[ModuleCommand] {}
  !MODULE[ModuleScienceExperiment] {}
  !MODULE[ModuleScienceContainer] {}
  !MODULE[ModuleDataTransmitter] {}
  !MODULE[ModuleCargoPart] {}
  !MODULE[ModuleInventoryPart] {}
  !MODULE[ModuleConductionMultiplier] {}
  !MODULE[ModuleLiftingSurface] {}

  MODULE {
    name = NovaBatteryModule
    capacity = 9000000
    value = 9000000
    maxRate = 2500
  }

  MODULE {
    name = NovaCommandModule
    idleDraw = 30
    testLoadRate = 1000
  }

  // Integrated RA-2-class relay — stock MpoProbe ships with a
  // RELAY ModuleDataTransmitter built in. Tier-4 spec; see
  // communications/RelayAntenna5.cfg.
  MODULE {
    name = NovaAntennaModule
    txPower = 100
    gain = 10
    maxRate = 5000
    refDistance = 1500000
  }
}
