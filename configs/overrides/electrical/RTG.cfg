// PB-NUK Pu-238 RTG, MMRTG-class (Curiosity / Perseverance). 125 W
// electrical BOL from ~2 kW thermal at ~6% conversion efficiency —
// the remaining ~1875 W is waste heat the cooling loop has to deal
// with. Decay quantized to 0.1%/step → ~46 d/step at Pu-238's
// 87.7-year half-life; both electrical and waste heat decay together.
//
// Thermal model: device temperature ranges 0..525 °C (real MMRTG
// hot-side limit). thermalMassJK sets the heat capacity of the
// device; together they imply buffer capacity = thermalMassJK ×
// maxOperatingTempC = 1.05 MJ. At 1875 W production (no cooling,
// vacuum) the device crosses 0 → 525 °C in roughly 9 minutes.
//
// Built-in body radiation is quantized into 10 discrete rejection
// tiers (R_i = envFactor × i / N). At full T (saturated) the device
// rejects 1800 W in vacuum / 2200 W at 1 atm; intermediate buffer
// fractions step down linearly. The buffer pins to its equilibrium
// tier when reached — no cycling at marginal cooling. See Rtg.cs
// for the full model. maxHeatRateOut leaves headroom over nominal
// waste production so radiators can drain stored heat (not just
// match production).
@PART[rtg]
{
  !MODULE[ModuleGenerator] {}
  !MODULE[ModuleCoreHeat] {}

  MODULE {
    name = NovaRtgModule
    referencePower = 125
    halfLifeDays = 32032
    thermalOutput = 2000
    maxOperatingTempC = 525
    thermalMassJK = 2000
    maxHeatRateOut = 3000
    vacuumRejectionW = 1800
    atmRejectionW = 2200
  }
}
