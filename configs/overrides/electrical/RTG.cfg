// PB-NUK Pu-238 RTG, MMRTG-class (Curiosity / Perseverance). 125 W
// electrical BOL from ~2 kW thermal at ~6% conversion efficiency.
// Decay quantized to 0.1%/step → ~46 d/step at Pu-238's 87.7-year
// half-life.
@PART[rtg]
{
  !MODULE[ModuleGenerator] {}
  !MODULE[ModuleCoreHeat] {}

  MODULE {
    name = NovaRtgModule
    referencePower = 125
    halfLifeDays = 32032
  }
}
