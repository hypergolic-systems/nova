// Per-body atmospheric layer definitions consumed by Nova's
// AtmosphericProfileExperiment. Layers are listed bottom-to-top; a
// vessel at a given altitude is "in" the first layer whose `top` is
// strictly greater than the vessel's altitude. Above the topmost layer
// the vessel is in vacuum and the experiment is not applicable.
//
// Boundaries are placeholders — easy to retune; tune after playtest.

NOVA_ATMOSPHERE_LAYERS {
  body = Kerbin
  LAYER { name = troposphere, top = 18000 }
  LAYER { name = stratosphere, top = 45000 }
  LAYER { name = mesosphere, top = 70000 }
}

NOVA_ATMOSPHERE_LAYERS {
  body = Eve
  LAYER { name = troposphere, top = 30000 }
  LAYER { name = stratosphere, top = 60000 }
  LAYER { name = mesosphere, top = 90000 }
}

NOVA_ATMOSPHERE_LAYERS {
  body = Duna
  LAYER { name = troposphere, top = 15000 }
  LAYER { name = stratosphere, top = 35000 }
  LAYER { name = mesosphere, top = 50000 }
}

NOVA_ATMOSPHERE_LAYERS {
  body = Jool
  LAYER { name = troposphere, top = 50000 }
  LAYER { name = stratosphere, top = 120000 }
  LAYER { name = mesosphere, top = 200000 }
}

NOVA_ATMOSPHERE_LAYERS {
  body = Laythe
  LAYER { name = troposphere, top = 15000 }
  LAYER { name = stratosphere, top = 35000 }
  LAYER { name = mesosphere, top = 50000 }
}
