// Add a small flash data store to stock probe cores so any vessel with
// a probe core can buffer science files before transmission lands.
// Capacity is in bytes; M2 file sizes are 1 KB (atm-profile) and 5 KB
// (long-term-study), so 100 KB ≈ 100 atm or 20 lts files per core.

@PART[probeCoreCube] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 102400
  }
}

@PART[probeCoreOcto_v2] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 102400
  }
}

@PART[probeStackSmall] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 204800
  }
}

@PART[probeCoreSphere_v2] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 102400
  }
}

@PART[probeCoreOcto2_v2] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 204800
  }
}

@PART[probeCoreHex_v2] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 102400
  }
}

@PART[HECS2_ProbeCore] {
  MODULE {
    name = NovaDataStorageModule
    capacityBytes = 524288
  }
}
