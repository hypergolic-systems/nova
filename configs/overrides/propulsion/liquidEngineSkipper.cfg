@PART[engineLargeSkipper_v2]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}
  !EFFECTS {}

  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaEngineModule
    thrust = 650
    isp = 338
    engineClass = Sustainer
    gimbalRange = 2
    gimbalTransformName = thrustTransform
    PROPELLANT {
      resource = RP-1
      ratio = 2
    }
    PROPELLANT {
      resource = Liquid Oxygen
      ratio = 3
    }
  }

  // Waterfall plume. Stock waterfall-kerolox-sustainer-1 template
  // references `throttle` (published by Nova), `atmosphereDepth`
  // (stock AtmosphereDensityController), and `random` (stock
  // RandomnessController). Both stock controllers are declared inline;
  // `throttle` is injected at runtime by WaterfallInitializePatch.
  MODULE {
    name = ModuleWaterfallFX
    moduleID = novaSkipperFX

    ATMOSPHEREDENSITYCONTROLLER {
      name = atmosphereDepth
    }

    RANDOMNESSCONTROLLER {
      name = random
      range = -1, 1
      scale = 1
    }

    TEMPLATE {
      templateName = waterfall-kerolox-sustainer-1
    }
  }
}
