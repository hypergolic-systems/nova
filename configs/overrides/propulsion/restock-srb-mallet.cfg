// ReStockPlus — 0.625m sep motor.
// Solid Propellant volume ≈ stockSF(u) × 7.5(kg/u) / 1.8(kg/L) = 80 × 4.167.
// maxRate ≈ 2 × physical mdot (matches existing-SRB tuning convention).
// chemistry = srb expands to a single PROPELLANT (Solid Propellant) block
// at :LAST[Nova] via _finalize/chemistry.cfg.
@PART[restock-srb-mallet-1]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 115
    isp = 165
    engineClass = Booster
    chemistry = srb
  }

  // Stock: 80u SolidFuel @ 7.5 kg/u = 600 kg. Nova: 600/1.8 ≈ 333 L → 335.
  MODULE {
    name = NovaTankModule
    volume = 335
    maxRate = 80
    TANK {
      resource = Solid Propellant
      capacity = 335
    }
  }
}
