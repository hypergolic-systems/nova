@PART[Mite]
{
  novaChemistry = srb
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 12.5
    isp = 200
    engineClass = Booster
  }

  // Stock: 40u × 7.5 kg/u = 300 kg. Nova: 300/1.8 ≈ 167 L → 170.
  MODULE {
    name = NovaTankModule
    volume = 170
    maxRate = 10
    TANK {
      resource = Solid Propellant
      capacity = 170
    }
  }
}
