@PART[Shrimp]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 30
    isp = 220
    PROPELLANT {
      resource = Solid Propellant
      ratio = 1
    }
  }

  // Stock: 90u × 7.5 kg/u = 675 kg. Nova: 675/1.8 = 375 L.
  MODULE {
    name = NovaTankModule
    volume = 375
    maxRate = 15
    TANK {
      resource = Solid Propellant
      capacity = 375
    }
  }
}
