// LV-N "Nerv" — Nuclear Thermal Rocket. A NovaNuclearEngineModule
// replaces stock's ModuleEngines: the reactor sits at one of five
// state-machine phases (Cold/Warming/Idle/Throttled/Cooling) and LH₂
// is both propellant and primary coolant. See
// `mod/Nova.Core/Components/Propulsion/NuclearEngine.cs` for the model
// and the per-tick heat balance.
//
// Calibration:
//   • Throttle (0..1) controls fission power linearly: P = 14.575 MW
//     at t=0, 300 MW at t=1. (IdlePowerW / MaxPowerW.)
//   • Coolant valve is implicitly modelled: flow demand at each
//     throttle is whatever maintains TargetTempK at the heat balance.
//     T target = lerp(1500, 2700, t/0.25) for t ∈ [0, 0.25], then
//     plateau at 2700 K. So throttle 0..25% is a "spool zone" where
//     core temp climbs toward op temp; throttle 25..100% holds at op
//     temp and scales flow + thrust linearly.
//   • Idle (throttle ≈ 0): 0.5 kg/s LH₂ flow at 1500 K equilibrium —
//     visible drain even without producing thrust.
//   • Full throttle: 7.65 kg/s LH₂ at 2700 K — rated 60 kN / 800 s.
//   • Cold→Warming→Throttled warmup uses a *forced linear ramp*
//     (not the heat-balance physics) over WarmupDurationSec (45 s).
//     Temperature climbs in a straight line from AmbientK to
//     IdleTempK; state transitions Throttled at the end. The reactor
//     controller is treated as procedural — clean countdown to
//     "ready", no asymptotic tail. Heat-balance physics resumes
//     once in Throttled.
//   • Cooling: no fission, CoolingCoeffWK (3300 W/K) drops the core
//     from 1500 K back to ColdThresholdK (320 K) in ~200 s.
//   • SlewRatePerSec (0.1) → throttle ramp 0→1 in 10 s; the LP
//     re-solves at every 1% quantum so flow + thrust track ACT
//     smoothly through the slew.
@PART[nuclearEngine]
{
  novaChemistry = ntr-lh2
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}
  !MODULE[ModuleCoreHeat] {}
  !MODULE[ModuleOverheatDisplay] {}
  !EFFECTS {}

  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaNuclearEngineModule
    thrust = 60
    isp = 800
    thermalMassJK = 125000
    ambientK = 290
    coldThresholdK = 320
    warmupDurationSec = 45
    idleTempK = 1500
    operatingTempK = 2700
    spoolEndThrottle = 0.25
    idlePowerW = 14575000
    maxPowerW = 300000000
    coolingCoeffWK = 3300
    inletTempK = 20
    cpH2JKgK = 14300
    slewRatePerSec = 0.1
    decayTauSeconds = 30
  }

  // Waterfall plume. `throttle` (= ThrustOutputFraction, gated to 0
  // outside Throttled state) drives plume intensity. The stock
  // waterfall-ntr-lh2-1 template also references `atmosphereDepth` for
  // the back-pressure-dependent plume shape — that's provided by
  // Waterfall's stock AtmosphereDensityController, declared below. NTR
  // ramp + glow signals (`playerThrottle`, `reactorTemp`,
  // `reactorState{Cold,Warming,Throttled,Cooling}`) are also published
  // by NovaNuclearEngineModule; a Nova-specific template can layer
  // reactor-glow / cooling-LH₂-vent effects on top.
  MODULE {
    name = ModuleWaterfallFX
    moduleID = novaNtrFX

    ATMOSPHEREDENSITYCONTROLLER {
      name = atmosphereDepth
    }

    TEMPLATE {
      templateName = waterfall-ntr-lh2-1
    }
  }
}
