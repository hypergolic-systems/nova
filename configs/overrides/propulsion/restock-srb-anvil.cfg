// ReStockPlus — 1.875m heavy SRB.
// Solid Propellant volume ≈ stockSF(u) × 7.5(kg/u) / 1.8(kg/L) = 7200 × 4.167.
// maxRate ≈ 2 × physical mdot (matches existing-SRB tuning convention).
// chemistry = srb expands to a single PROPELLANT (Solid Propellant) block
// at :LAST[Nova] via _finalize/chemistry.cfg.
@PART[restock-srb-anvil-1]
{
  novaChemistry = srb
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 2250
    isp = 238
    engineClass = Booster
    gimbalRange = 3
  }

  // Stock: 7200u SolidFuel @ 7.5 kg/u = 54000 kg. Nova: 54000/1.8 ≈ 30000 L → 30000.
  MODULE {
    name = NovaTankModule
    volume = 30000
    maxRate = 1070
    TANK {
      resource = Solid Propellant
      capacity = 30000
    }
  }
}
