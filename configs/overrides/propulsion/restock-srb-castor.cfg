// ReStockPlus — 1.875m mid SRB.
// Solid Propellant volume ≈ stockSF(u) × 7.5(kg/u) / 1.8(kg/L) = 5800 × 4.167.
// maxRate ≈ 2 × physical mdot (matches existing-SRB tuning convention).
// chemistry = srb expands to a single PROPELLANT (Solid Propellant) block
// at :LAST[Nova] via _finalize/chemistry.cfg.
@PART[restock-srb-castor-1]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 1300
    isp = 225
    engineClass = Booster
    gimbalRange = 3
    chemistry = srb
  }

  // Stock: 5800u SolidFuel @ 7.5 kg/u = 43500 kg. Nova: 43500/1.8 ≈ 24167 L → 24165.
  MODULE {
    name = NovaTankModule
    volume = 24165
    maxRate = 655
    TANK {
      resource = Solid Propellant
      capacity = 24165
    }
  }
}
