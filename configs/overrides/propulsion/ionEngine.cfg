@PART[ionEngine]
{
  novaChemistry = ion
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !EFFECTS {}

  stagingIcon = LIQUID_ENGINE

  // NSTAR-class thruster (Dawn heritage). Two cross-system inputs —
  // Xenon (Staging / Topological) and ElectricCharge (Process /
  // Uniform) — coupled post-solve: thrust = min(xeAct, ecAct). Waste
  // heat exports to the Process Heat bus (Critical priority) — needs a
  // radiator in the stack or the engine overtemps and trips. Trip is
  // sticky; cleared via the `setIonResetTrip` topic op.
  MODULE {
    name = NovaIonEngineModule
    thrust = 0.09                     // kN — NSTAR rated
    isp = 3100                        // s vac — NSTAR
    engineClass = Ionic
    ratedPowerW = 2300                // W at full throttle
    jetEfficiency = 0.66              // fraction EC → jet (waste = 0.34)
    thermalMassJK = 5000              // J/K — engine block heat capacity
    ambientK = 290                    // K — vacuum-soak reference
    maxOperatingTempK = 1500          // K — overtemp trip threshold
    maxHeatRejectionW = 1500          // W — heat outlet bandwidth
    tripXeShortfallThreshold = 0.05   // δSatisfaction (xe vs ec) for trip
  }

  // Waterfall plume. `throttle` is published by NovaIonEngineModule
  // (via IWaterfallControllerProvider — injected by WaterfallInitializePatch
  // postfix on ModuleWaterfallFX.Initialize). Nova also publishes
  // `ionTripped`, `ionHeat`, `ionEcDraw` and the base `active` — the
  // stock waterfall-ion-xenon-1 template only consumes `throttle`,
  // but a Nova-specific template can hook the others.
  MODULE {
    name = ModuleWaterfallFX
    moduleID = novaIonFX

    TEMPLATE {
      templateName = waterfall-ion-xenon-1
    }
  }
}
