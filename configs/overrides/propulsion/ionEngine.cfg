@PART[ionEngine]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}

  stagingIcon = LIQUID_ENGINE

  // Stock Dawn draws ElectricCharge alongside Xenon; Nova's Engine is a
  // Staging device (Topological-only) so EC isn't wired through here.
  // The single-Xenon model preserves the high-Isp / low-thrust feel
  // until ProcessFlowSystem co-consumption lands as a follow-up.
  MODULE {
    name = NovaEngineModule
    thrust = 2
    isp = 4200
    engineClass = Ionic
    PROPELLANT {
      resource = Xenon
      ratio = 1
    }
  }
}
