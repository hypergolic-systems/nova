// ReStockPlus Cherenkov — 2.5m nuclear-thermal rocket. 300 kN / 820 s vac;
// ~5× LV-N's thrust scale (60 kN / 800 s).
//
// Tuning derived from liquidEngineLV-N.cfg by proportional scaling, with
// some sublinear adjustments (see comments below). See LV-N for the
// model docs — reactor state machine, throttle slew, heat balance, decay
// heat scheduling all carry over unchanged.
//
// Key scaling decisions:
//   • Power 5× LV-N (300 MW → 1.5 GW max).
//   • Thermal mass 5× (125 kJ/K → 625 kJ/K) — proportional to reactor
//     material mass.
//   • Cooling coefficient ~3× (3300 W/K → 10000 W/K) — surface area
//     scales as mass^(2/3), so radiative cooling lags volume growth.
//     Net: cooling time from operating to cold is similar (~250 s),
//     not the proportional 1000 s a 5× cooling would give.
//   • OperatingTempK kept at 2700 (same as LV-N) — Cherenkov's 20 s
//     of extra Isp comes from a hypothetically longer expansion bell,
//     not a hotter core. Keeps gameplay throttle-temperature feel
//     identical to LV-N.
//   • WarmupDurationSec 60 (vs 45 LV-N) — larger reactor takes
//     proportionally longer to warm; small bump that's noticeable.
//
// Nova-NTR design choice (matching LV-N): no gimbal. Strip ModuleGimbal
// explicitly so the :LAST gimbal-inherit patch doesn't reattach it.
@PART[restock-engine-cherenkov]
{
  novaChemistry = ntr-lh2
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}
  !EFFECTS {}

  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaNuclearEngineModule
    thrust = 300
    isp = 820
    thermalMassJK = 625000
    ambientK = 290
    coldThresholdK = 320
    warmupDurationSec = 60
    idleTempK = 1500
    operatingTempK = 2700
    spoolEndThrottle = 0.25
    idlePowerW = 75000000
    maxPowerW = 1500000000
    coolingCoeffWK = 10000
    inletTempK = 20
    cpH2JKgK = 14300
    slewRatePerSec = 0.1
    decayTauSeconds = 30
  }

  // Waterfall plume fallback — WaterfallRestock's RestockPlusCherenkov.cfg
  // (if installed) strips this block and adds its own with custom audio,
  // smoke particles, and the same waterfall-ntr-lh2-1 template. Without
  // WaterfallRestock, this block keeps the engine visually alive.
  MODULE {
    name = ModuleWaterfallFX
    moduleID = novaCherenkovFX

    ATMOSPHEREDENSITYCONTROLLER {
      name = atmosphereDepth
    }

    TEMPLATE {
      templateName = waterfall-ntr-lh2-1
    }
  }
}
