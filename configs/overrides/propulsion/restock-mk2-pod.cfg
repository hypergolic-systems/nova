@PART[restock-mk2-pod]
{
  !RESOURCE[MonoPropellant] {}
  !MODULE[ModuleReactionWheel] {}

  MODULE
  {
    name = NovaTankModule
    volume = 20
    maxRate = 100
    TANK
    {
      resource = Hydrazine
      capacity = 20
      value = 20
    }
  }

  MODULE
  {
    name = NovaReactionWheelModule
    pitchTorque = 5
    yawTorque = 5
    rollTorque = 5
    electricRate = 250
  }
}
