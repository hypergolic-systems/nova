@PART[mk1-3pod]
{
  !MODULE[ModuleRCSFX] {}
  !MODULE[FXModuleAnimateRCS] {}
  !RESOURCE[MonoPropellant] {}

  MODULE
  {
    name = NovaRcsModule
    thrusterPower = 1
    isp = 220
    thrusterTransformName = thrustTransform
    PROPELLANT
    {
      resource = Hydrazine
      ratio = 1
    }
  }

  MODULE
  {
    name = NovaTankModule
    volume = 120
    TANK
    {
      resource = Hydrazine
      capacity = 120
      value = 120
    }
  }

  !MODULE[ModuleReactionWheel] {}

  MODULE
  {
    name = NovaReactionWheelModule
    pitchTorque = 15
    yawTorque = 15
    rollTorque = 15
    electricRate = 750
  }
}
