// Patches both stock variants — the modern v2 model and the legacy
// fallback that ships alongside it. Both have identical engine specs
// in stock, so the same MODULE block applies.

@PART[Size2LFB|Size2LFB_v2]
{
  novaChemistry = kerolox
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}

  // Strip the stock LF/Ox tank baked into the LFB, replace with kerolox
  // sized to the same 6400 L total volume (2880 LF + 3520 Ox stock).
  !RESOURCE[LiquidFuel] {}
  !RESOURCE[Oxidizer] {}

  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaEngineModule
    thrust = 2000
    isp = 304
    engineClass = Booster
    gimbalRange = 1.5
  }

  MODULE {
    name = NovaTankModule
    volume = 6400
    maxRate = 1500
    TANK {
      resource = RP-1
      capacity = 2560
    }
    TANK {
      resource = Liquid Oxygen
      capacity = 3840
    }
  }
}
