// ReStockPlus — 0.625m Launch Escape System (LES-2).
// Combines a solid-propellant escape motor with a bottom decoupler.
// Solid Propellant volume ≈ stockSF(u) × 7.5(kg/u) / 1.8(kg/L) = 25 × 4.167 ≈ 104 L → 105.
// maxRate ≈ 2 × physical mdot = 2 × (200×1000 / (180×9.81)) / 1.8 ≈ 126 L/s.
// chemistry = srb expands to a single PROPELLANT (Solid Propellant) block
// at :LAST[Nova] via _finalize/chemistry.cfg.
@PART[restock-engine-les-2]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleDecouple] {}
  !RESOURCE[SolidFuel] {}

  stagingIcon = SOLID_BOOSTER

  MODULE {
    name = NovaEngineModule
    thrust = 200
    isp = 180
    engineClass = Booster
    chemistry = srb
  }

  // Stock: 25u SolidFuel @ 7.5 kg/u = 187.5 kg. Nova: 187.5/1.8 ≈ 104 L → 105.
  MODULE {
    name = NovaTankModule
    volume = 105
    maxRate = 126
    TANK {
      resource = Solid Propellant
      capacity = 105
    }
  }

  MODULE {
    name = NovaDecouplerModule
    ejectionForce = 40
    explosiveNodeID = bottom
  }
}
