@PART[liquidEngine2_v2]
{
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}
  !MODULE[ModuleGimbal] {}

  // The stock LV-T45 cfg doesn't declare stagingIcon at the part
  // level; stock relies on ModuleEngines.OnStart to set it. Since we
  // strip ModuleEngines, add it ourselves so the editor's auto-stager
  // recognises this as a fireable engine. (LV-T30's stock cfg already
  // declares this at the part level, so its patch doesn't need to.)
  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaEngineModule
    thrust = 215
    isp = 320
    gimbalRange = 3
    gimbalTransformName = Gimbal
    PROPELLANT {
      resource = RP-1
      ratio = 2
    }
    PROPELLANT {
      resource = Liquid Oxygen
      ratio = 3
    }
  }
}
