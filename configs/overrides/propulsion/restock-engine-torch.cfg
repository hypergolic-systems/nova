// ReStockPlus — 0.625m kerolox booster.
// Waterfall plume comes from WaterfallRestock's own MM patch.
// gimbalTransformName auto-inherited at :LAST[Nova] from the
// surviving ModuleGimbal; chemistry tag expands to PROPELLANT
// blocks at :LAST[Nova] via _finalize/chemistry.cfg.
@PART[restock-engine-torch]
{
  novaChemistry = kerolox
  !MODULE[ModuleEngines] {}
  !MODULE[ModuleEnginesFX] {}
  !MODULE[ModuleAlternator] {}

  stagingIcon = LIQUID_ENGINE

  MODULE {
    name = NovaEngineModule
    thrust = 55
    isp = 295
    engineClass = Booster
    gimbalRange = 1
  }
}
