// Stock radiator override. Fixed panels (radPanelEdge / Sm / Lg) are
// vac-balanced; folding TCS deployables get a 40% boost in atm where
// forced convection helps. Deployability is implicit in the
// `animationName` field — set it to enable deploy mechanics, omit it
// for fixed panels. Cooling rates anchored to stock
// `maxEnergyTransfer`; EC consumption matches stock 0.025 / 0.5 EC/s
// at full output.
@PART[radPanelEdge,radPanelSm,radPanelLg,foldingRadSmall,foldingRadMed,foldingRadLarge]
{
  !MODULE[ModuleActiveRadiator] {}
  !MODULE[ModuleDeployableRadiator] {}
  !MODULE[ModuleCoreHeat] {}
  !RESOURCE[ElectricCharge] {}
}

@PART[radPanelEdge]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 50
    atmCoolingW = 50
    ecPerWattCooling = 0
  }
}

@PART[radPanelSm]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 200
    atmCoolingW = 200
    ecPerWattCooling = 0
  }
}

@PART[radPanelLg]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 1000
    atmCoolingW = 1000
    ecPerWattCooling = 0
  }
}

@PART[foldingRadSmall]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 5000
    atmCoolingW = 7000
    ecPerWattCooling = 2.5e-6
    animationName = Deploy
  }
}

@PART[foldingRadMed]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 25000
    atmCoolingW = 35000
    ecPerWattCooling = 2.5e-6
    animationName = Deploy
  }
}

@PART[foldingRadLarge]
{
  MODULE
  {
    name = NovaRadiatorModule
    vacuumCoolingW = 50000
    atmCoolingW = 70000
    ecPerWattCooling = 2.5e-6
    animationName = Deploy
  }
}
