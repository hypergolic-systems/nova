// HG-55 — direct, tier 4. First "gain" antenna (G=10). Knee
// ≈ 15 Mm vs KSC, two-of-itself at 1.5 Mm (Mun-scale relays).
@PART[HighGainAntenna]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 100
    gain = 10
    maxRate = 5000
    refDistance = 1500000
  }
}
