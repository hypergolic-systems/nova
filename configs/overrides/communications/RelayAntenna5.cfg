// RA-2 — relay-role direct, tier 4 (parallel to HG-55). Knee
// ≈ 15 Mm vs KSC, two-of-itself at 1.5 Mm. Stock RELAY/DIRECT
// distinction isn't preserved — Nova treats every antenna as
// both endpoint and relay node.
@PART[RelayAntenna5]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 100
    gain = 10
    maxRate = 5000
    refDistance = 1500000
  }
}
