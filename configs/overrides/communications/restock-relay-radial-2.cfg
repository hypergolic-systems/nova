// HG-20 (ReStockPlus) — relay-role, tier 3. Knee ≈ 2.2 Mm
// vs KSC, two-of-itself at 120 km. Bridges the gap between
// HG-5 (474 km) and HG-55 (15 Mm).
@PART[restock-relay-radial-2]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 10
    gain = 3
    maxRate = 1000
    refDistance = 120000
  }
}

@PART[restock-relay-radial-2_v2]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 10
    gain = 3
    maxRate = 1000
    refDistance = 120000
  }
}
