// Communotron 16-S — first Nova-side antenna. Power calibrated so
// Shannon falloff is visible during early-flight (sub-orbital) ops
// while still preserving link through a typical 300km-apoapsis arc.
//
// Knee distance (where the Shannon ratio = 1, i.e. SNR = RefSnr):
//   d_knee = refDistance · sqrt(G_KSC / G_C16S)
// With G_KSC = 1000 and G_C16S = 1, sqrt term = ~31.6, so:
//   refDistance = 3000 → knee ≈ 95km
// At 200km the ratio ≈ (95/200)² ≈ 0.23 → bucket 2 (~20 bps).
// At 100km the ratio ≈ (95/100)² ≈ 0.90 → bucket 9 (~90 bps).
// At <95km the link saturates at maxRate (100 bps).
@PART[SurfAntenna]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 1
    gain = 1
    maxRate = 100
    refDistance = 3000
  }
}
