// Communotron 16-S — first Nova-side antenna. Power calibrated low so
// Shannon falloff is visible by ~500km from KSC.
//
// Knee distance (where the Shannon ratio = 1, i.e. SNR = RefSnr):
//   d_knee = refDistance · sqrt(G_KSC / G_C16S)
// With G_KSC = 1000 and G_C16S = 1, sqrt term = ~31.6, so:
//   refDistance = 5000 → knee ≈ 158km
// At 500km the ratio = (158/500)² ≈ 0.10 → bucket 1 (~10 bps).
// At 200km the ratio ≈ 0.62 → bucket 6 (~60 bps). Nice spread.
@PART[SurfAntenna]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 1
    gain = 1
    maxRate = 100
    refDistance = 5000
  }
}
