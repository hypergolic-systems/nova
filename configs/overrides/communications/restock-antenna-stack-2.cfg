// DTS-J1 (ReStockPlus) — direct, tier 4 (mirrors DTS-M1).
// Knee ≈ 15 Mm vs KSC, two-of-itself at 1.5 Mm.
@PART[restock-antenna-stack-2]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 50
    gain = 10
    maxRate = 5000
    refDistance = 1500000
  }
}
