// HG-5 — direct, tier 2 (slightly above C16). Knee ≈ 474 km vs
// KSC, two-of-itself at 15 km. Both stock and KSP 1.12 cargo
// _v2 variant share the spec.
@PART[HighGainAntenna5]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 5
    gain = 1
    maxRate = 500
    refDistance = 15000
  }
}

@PART[HighGainAntenna5_v2]
{
  !MODULE[ModuleDataTransmitter] {}

  MODULE {
    name = NovaAntennaModule
    txPower = 5
    gain = 1
    maxRate = 500
    refDistance = 15000
  }
}
