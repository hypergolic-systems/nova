@PART[probeCoreOcto2_v2]
{
  !RESOURCE[ElectricCharge] {}
  !MODULE[ModuleCommand] {}
  !MODULE[ModuleSAS] {}
  !MODULE[ModuleScienceExperiment] {}
  !MODULE[ModuleScienceContainer] {}
  !MODULE[ModuleDataTransmitter] {}
  !MODULE[ModuleCargoPart] {}
  !MODULE[ModuleInventoryPart] {}
  !MODULE[ModuleConductionMultiplier] {}
  !MODULE[ModuleLiftingSurface] {}

  MODULE {
    name = NovaProbeModule
    idleDraw = 5
    testLoadRate = 1000
    sasLevel = 2
    // StoredCommands ledger. 2 KB capacity, 10 B/min decay (≈0.1667 B/s),
    // 100 B/s receive ceiling from KSC, 50 B/s of input cost per unit
    // input magnitude → ~40 s of full pitch with no link before the
    // ledger empties; ~20 s of healthy link to refill from empty.
    commandCapacityBytes  = 2000
    commandDecayBps       = 0.1667
    commandReceiveRateBps = 100
    inputCostBps          = 50
  }
}
