// Expand `chemistry = <tag>` on Nova engine modules into PROPELLANT
// blocks. Engine cfgs declare e.g. `chemistry = kerolox` instead of
// per-engine PROPELLANT { resource;ratio } blocks; this :LAST[Nova]
// patch translates the tag.
//
// Ratios are Nova's gameplay-tuning canonical values (kept stable
// across this refactor — see commit message). Don't bake real-world
// volumetric MRs in without coordinating a rebalance pass — every
// existing stock craft's ΔV depends on them.
//
// Catalogue:
//   kerolox     RP-1 + LOX        (Russian / early-American)
//   hydrolox    LH2 + LOX         (Centaur / SSME vacuum)
//   methalox    Methane + LOX     (Raptor-class modern)
//   hypergolic  Hydrazine + NTO   (Vernier / storable bipropellant)
//   monoprop    Hydrazine only    (OMS-class maneuvering)
//   ntr-lh2     LH2 only          (nuclear-thermal)
//   ion         Xenon only        (gridded electrostatic)
//   srb         Solid Propellant  (booster grain)
//
// Matches all three Nova engine module types (NovaEngineModule,
// NovaNuclearEngineModule, NovaIonEngineModule) via name OR.

@PART:HAS[@MODULE[NovaEngineModule|NovaNuclearEngineModule|NovaIonEngineModule]:HAS[#chemistry[kerolox]]]:LAST[Nova]
{
  @MODULE[NovaEngineModule|NovaNuclearEngineModule|NovaIonEngineModule]:HAS[#chemistry[kerolox]]
  {
    PROPELLANT { resource = RP-1; ratio = 2 }
    PROPELLANT { resource = Liquid Oxygen; ratio = 3 }
    !chemistry = delete
  }
}

@PART:HAS[@MODULE[NovaEngineModule|NovaNuclearEngineModule|NovaIonEngineModule]:HAS[#chemistry[hydrolox]]]:LAST[Nova]
{
  @MODULE[NovaEngineModule|NovaNuclearEngineModule|NovaIonEngineModule]:HAS[#chemistry[hydrolox]]
  {
    PROPELLANT { resource = Liquid Hydrogen; ratio = 3 }
    PROPELLANT { resource = Liquid Oxygen; ratio = 1 }
    !chemistry = delete
  }
}

