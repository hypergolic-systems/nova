// Expand a PART-level `novaChemistry = <tag>` into PROPELLANT blocks on
// the appropriate Nova engine module at :LAST[Nova]. Engine cfgs declare
// e.g. `novaChemistry = kerolox` at PART top-level (NOT inside the
// MODULE) instead of per-engine PROPELLANT { resource;ratio } blocks.
//
// Two non-obvious things to know if you're editing this file:
//
//   • PART-level (not MODULE-level) matching: MM's
//     `@MODULE[Name]:HAS[#field[value]]` predicate doesn't match
//     anything in practice — zero confirmed examples across any
//     installed mod. The PART-level HAS form
//     (`@PART:HAS[#field[value]]`) is the well-supported one (Restock
//     uses `~RestockIgnore[*]` the same way).
//
//   • Multi-line PROPELLANT blocks: KSP's ConfigNode parser treats
//     everything between `{` and `}` on a single line as a single
//     key-value statement, so the compact
//     `PROPELLANT { resource = X; ratio = Y }` form silently parses
//     as `resource = "X; ratio = Y"` with no ratio field, breaking
//     the engine. Always use the verbose multi-line form below.
//
// Ratios are Nova's gameplay-tuning canonical values (kept stable
// across this refactor — see commit history). Don't bake real-world
// volumetric MRs in without coordinating a rebalance pass — every
// existing stock craft's ΔV depends on them.
//
// Catalogue:
//   kerolox     RP-1 + LOX        (NovaEngineModule)
//   hydrolox    LH2 + LOX         (NovaEngineModule)
//   methalox    Methane + LOX     (NovaEngineModule)
//   hypergolic  Hydrazine + NTO   (NovaEngineModule)
//   monoprop    Hydrazine only    (NovaEngineModule)
//   srb         Solid Propellant  (NovaEngineModule)
//   ntr-lh2     LH2 only          (NovaNuclearEngineModule)
//   ion         Xenon only        (NovaIonEngineModule)

@PART:HAS[#novaChemistry[kerolox]]:LAST[Nova]
{
  @MODULE[NovaEngineModule]
  {
    PROPELLANT
    {
      resource = RP-1
      ratio = 2
    }
    PROPELLANT
    {
      resource = Liquid Oxygen
      ratio = 3
    }
  }
  !novaChemistry = delete
}

@PART:HAS[#novaChemistry[hydrolox]]:LAST[Nova]
{
  @MODULE[NovaEngineModule]
  {
    PROPELLANT
    {
      resource = Liquid Hydrogen
      ratio = 3
    }
    PROPELLANT
    {
      resource = Liquid Oxygen
      ratio = 1
    }
  }
  !novaChemistry = delete
}

