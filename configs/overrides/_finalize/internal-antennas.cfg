// Every part Nova owns as a command source gets a low-tier integrated
// antenna at :LAST[Nova] unless an explicit antenna patch already
// installed one. Mirrors stock's pattern of putting an INTERNAL
// ModuleDataTransmitter (antennaPower = 5000) on every probe core
// and crewed pod — without this catch-all, every command part the
// electrical/ overrides strip the stock MDT from ends up with zero
// comms in Nova.
//
// The :HAS[!MODULE[NovaAntennaModule]] guard is what makes parts
// with integrated higher-tier antennas (MpoProbe, HECS2-with-built-
// in-HG-55, …) keep their dedicated spec — those run in default pass
// and land before this :LAST sweep.
//
// Spec: knee ≈ 31 km vs KSC, two-of-itself at 1 km. Effectively pad-
// + first-apoapsis only, so external antennas remain mandatory for
// any orbital operation.
@PART:HAS[@MODULE[NovaCommandModule],!MODULE[NovaAntennaModule]]:LAST[Nova]
{
  MODULE {
    name = NovaAntennaModule
    txPower = 5
    gain = 1
    maxRate = 50
    refDistance = 1000
  }
}
