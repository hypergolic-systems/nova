// Pull gimbalTransformName from the live stock ModuleGimbal into the
// sibling NovaEngineModule at :LAST[Nova], then strip ModuleGimbal.
//
// Why: stock part configs put `gimbalTransformName = Gimbal` (or
// "gimbal" / "thrustTransform" / etc.) on each engine, but model-
// replacement mods like ReStock rename the pivot transform — e.g.
// stock "gimbal" becomes "B_Gimbal" on ReStock's Mainsail. Their patch
// `@MODULE[ModuleGimbal] { @gimbalTransformName = B_Gimbal }` runs in
// default pass, alphabetical, so Nova (default pass, "Nova" < "ReStock")
// strips ModuleGimbal first and ReStock's rename matches nothing.
//
// Running this copy in :LAST[Nova] sees the post-everyone-else value,
// so Nova picks up whichever transform the installed model actually
// has — stock, ReStock, or any future renaming mod that uses the same
// @MODULE[ModuleGimbal] edit pattern.
//
// gimbalRange stays hardcoded per-engine in Nova's cfgs — it's
// gameplay tuning, not a model-side detail. (Sometimes Nova's value
// matches stock; sometimes it's a deliberate Nova rebalance.)
//
// Engines where Nova *intentionally* drops gimbaling (NTR) strip
// ModuleGimbal in their per-engine cfg; this patch's :HAS guard
// naturally excludes them.
@PART:HAS[@MODULE[NovaEngineModule],@MODULE[ModuleGimbal]]:LAST[Nova]
{
  @MODULE[NovaEngineModule]
  {
    %gimbalTransformName = #$/MODULE[ModuleGimbal]/gimbalTransformName$
  }
  !MODULE[ModuleGimbal] {}
}
