name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod:
    name: C# build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: extractions/setup-just@v2

      # `just test` is the unified entry point: it depends on
      # `mod-build` (which runs `proto` first) and chains into
      # `save-cli-test`. We split into separate jobs here so the C#
      # and Rust suites run in parallel — `mod-test` is the C#-only
      # variant.
      - run: just mod-test

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: extractions/setup-just@v2
      - run: just save-cli-test
