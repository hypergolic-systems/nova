name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Sibling Dragonglass checkout. Both the C# and UI jobs need it:
# Nova references Dragonglass.{Hud,Telemetry}.dll for KSPAddon
# integration and pulls @dragonglass/* npm packages for typecheck.
# Single env var keeps the path consistent across jobs.
env:
  DRAGONGLASS_PATH: ${{ github.workspace }}/dragonglass

jobs:
  mod:
    name: C# build + tests
    runs-on: ubuntu-latest
    # Tests run through Mono's net48 testhost so we exercise the
    # same runtime KSP uses.
    env:
      MONO_LOG_LEVEL: warning
      MONO_LOG_MASK: asm,dll,cfg
      VSTEST_CONNECTION_TIMEOUT: "300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hypergolic-systems/dragonglass
          path: dragonglass

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Caches both regular package references AND `dotnet tool
      # restore` binaries (the protobuf-net.protogen tool's package
      # lives under ~/.nuget/packages/ like any other restore). Hash
      # over both repos' csprojs (Nova + sibling Dragonglass) plus
      # the dotnet-tools manifest so a dep bump anywhere busts the
      # cache.
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Mono (net48 test host)
        run: sudo apt-get update && sudo apt-get install -y mono-complete

      - uses: extractions/setup-just@v2

      # Build Dragonglass first to produce Dragonglass.{Hud,Telemetry}.dll,
      # then sync them into Nova's stubs/dragonglass/ for the
      # <Reference> resolution Nova.csproj relies on.
      - name: Build Dragonglass mod (sibling)
        working-directory: dragonglass
        run: just mod-build

      - name: Sync Dragonglass stubs
        run: just sync-dragonglass-stubs

      # Mono PInvoke for [DllImport("google-ortools-native")] resolves
      # via the assembly directory + LD_LIBRARY_PATH. The csproj copies
      # the .so into the test bin dir; pinning LD_LIBRARY_PATH ensures
      # the testhost subprocess inherits it.
      - name: Build
        run: just mod-build

      - name: Pin LD_LIBRARY_PATH to the test bin directory
        run: echo "LD_LIBRARY_PATH=$PWD/mod/Nova.Tests/bin/Release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Test
        run: just mod-test

  ui:
    name: UI typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hypergolic-systems/dragonglass
          path: dragonglass

      # setup-node's built-in npm cache caches ~/.npm (the registry
      # tarball cache) keyed on the lockfile. `npm install` still
      # runs to populate node_modules, but it pulls from disk
      # instead of the network.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - uses: extractions/setup-just@v2

      # tsc resolves symlinks to their real path, so when it
      # typechecks files inside ui/external/dragonglass/ui/packages/*
      # it walks up from the Dragonglass checkout — not Nova's ui/ —
      # looking for node_modules. Without an install in the sibling
      # checkout, deps like `three` (declared by @dragonglass/telemetry)
      # are unresolvable and typecheck fails.
      - name: Install Dragonglass UI deps
        working-directory: dragonglass/ui
        run: npm install

      # ui-bootstrap creates the ui/external/dragonglass symlink to
      # $DRAGONGLASS_PATH and runs `npm install` over the workspace
      # (which includes external/dragonglass/ui/packages/* as
      # workspaces, so @dragonglass/instruments and @dragonglass/
      # telemetry resolve as real packages for typecheck).
      - name: Bootstrap UI workspace
        run: just ui-bootstrap

      - name: Typecheck
        run: just ui-typecheck

      - name: Build
        run: just ui-build

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # prost-build invokes the system `protoc` binary at compile time
      # to translate proto/nova.proto into the generated Rust module.
      - name: Install protoc (prost-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: extractions/setup-just@v2
      - run: just save-cli-test
