name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod:
    name: C# build + tests
    # net48 tests on Linux need Mono and trip on a vstest protocol
    # negotiation timeout. macos-14 runs the same toolchain as our
    # dev box (osx-arm64) and is free on public repos.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: extractions/setup-just@v2
      - run: just mod-test

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # prost-build invokes the system `protoc` binary at compile time
      # to translate proto/nova.proto into the generated Rust module.
      - name: Install protoc (prost-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: extractions/setup-just@v2
      - run: just save-cli-test
