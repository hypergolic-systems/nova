name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod:
    name: C# build + tests
    runs-on: ubuntu-latest
    # Tests run through Mono's net48 testhost so we exercise the
    # same runtime KSP uses. MONO_LOG_LEVEL surfaces missing-assembly
    # / load failures that would otherwise be silent under vstest's
    # protocol-negotiation timeout. VSTEST_CONNECTION_TIMEOUT pads
    # the handshake window past the default 90s.
    env:
      MONO_LOG_LEVEL: warning
      MONO_LOG_MASK: asm,dll,cfg
      VSTEST_CONNECTION_TIMEOUT: "300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # mono-complete: full Mono BCL + tools. mono-runtime is too
      # minimal for vstest's testhost (System.Configuration etc.).
      - name: Install Mono (net48 test host)
        run: sudo apt-get update && sudo apt-get install -y mono-complete

      - uses: extractions/setup-just@v2
      - run: just mod-test

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # prost-build invokes the system `protoc` binary at compile time
      # to translate proto/nova.proto into the generated Rust module.
      - name: Install protoc (prost-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: extractions/setup-just@v2
      - run: just save-cli-test
