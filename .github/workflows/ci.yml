name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod:
    name: C# build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # `dotnet test` for a net48 assembly on Linux launches its test
      # host via Mono. ubuntu-latest doesn't pre-install Mono.
      - name: Install Mono (net48 test host)
        run: sudo apt-get update && sudo apt-get install -y mono-runtime

      - uses: extractions/setup-just@v2

      # `just test` is the unified entry point; we use `mod-test` here
      # so the C# and Rust jobs run in parallel.
      - run: just mod-test

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # prost-build invokes the system `protoc` binary at compile time
      # to translate proto/nova.proto into the generated Rust module.
      - name: Install protoc (prost-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: extractions/setup-just@v2
      - run: just save-cli-test
