name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod:
    name: C# build + tests
    runs-on: ubuntu-latest
    # Tests run through Mono's net48 testhost so we exercise the
    # same runtime KSP uses.
    env:
      MONO_LOG_LEVEL: warning
      MONO_LOG_MASK: asm,dll,cfg
      VSTEST_CONNECTION_TIMEOUT: "300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Mono (net48 test host)
        run: sudo apt-get update && sudo apt-get install -y mono-complete

      - uses: extractions/setup-just@v2

      - name: Build
        run: just mod-build

      # Diagnostic: did the linux-x64 OR-Tools runtime package even
      # restore? And did its .so files copy into the test output dir?
      - name: Inspect NuGet cache + test output directory
        run: |
          echo "--- NuGet OR-Tools runtime packages ---"
          ls -la ~/.nuget/packages/ | grep -i ortools || echo "(none found)"
          for pkg in ~/.nuget/packages/google.ortools.runtime.linux-x64/*/runtimes/linux-x64/native/; do
            echo "--- $pkg ---"
            ls -la "$pkg" 2>/dev/null || echo "(not found)"
          done
          echo ""
          echo "--- Test output dir ---"
          ls -la mod/Nova.Tests/bin/Release/

      # Mono's PInvoke search picks up `libgoogle-ortools-native.so` if
      # it's in LD_LIBRARY_PATH. The shim rpaths libortools.so.9 from
      # @loader_path-equivalent, so adding the bin dir is enough.
      - name: Pin LD_LIBRARY_PATH to the test bin directory
        run: echo "LD_LIBRARY_PATH=$PWD/mod/Nova.Tests/bin/Release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Test
        run: just mod-test

  rust:
    name: Rust save-cli build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # prost-build invokes the system `protoc` binary at compile time
      # to translate proto/nova.proto into the generated Rust module.
      - name: Install protoc (prost-build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: extractions/setup-just@v2
      - run: just save-cli-test
