syntax = "proto3";

package nova.v1;
option csharp_namespace = "Nova.Core.Persistence.Protos";

// Nova on-disk file format. Messages here back .hgc (craft) and .hgs
// (save) files. No backwards compatibility — Nova is an active-dev
// mod with one user; old saves break freely on schema changes.
// See `CLAUDE.md` → "Persistence wire format".

// --- Common types ---

message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Quat {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

// --- Top-level containers ---

message CraftMetadata {
  string name = 1;
  string description = 2;
  int32  facility = 3;       // EditorFacility enum (1=VAB, 2=SPH)
  int32  part_count = 4;
  int32  stage_count = 5;
  float  total_cost = 6;
  float  total_mass = 7;
  int32  vessel_type = 8;
  bytes  thumbnail = 9;      // PNG bytes, 256x256
  Vec3   size = 10;          // bounding box size (X,Y,Z)
}

message CraftFile {
  CraftMetadata metadata = 1;
  reserved 2 to 6;            // v1: Name/Description/Facility/VesselType/Rotation
  Vessel vessel = 7;
  Quat   rotation = 8;
  Vec3   editor_position = 9; // editor world position of root part
}

message SaveFile {
  double universal_time = 1;
  int32  active_vessel_index = 2;
  repeated Vessel vessels = 3;
  GameMetadata game = 4;
  repeated Kerbal crew = 5;
}

message GameMetadata {
  string title = 1;
  int32  mode = 2;            // 0=sandbox, 1=science, 2=career
  int32  seed = 3;
  string flag = 4;            // default flag URL
  int32  launch_id = 5;
  int32  scene = 6;           // GameScenes enum value
}

message Kerbal {
  string name = 1;
  int32  gender = 2;          // 0=male, 1=female
  string trait = 3;           // "Pilot", "Engineer", "Scientist"
  int32  state = 4;           // 0=Available, 1=Assigned, 2=Dead, 3=Missing
  float  courage = 5;
  float  stupidity = 6;
  bool   veteran = 7;
  uint32 assigned_vessel_id = 8;  // vessel persistentId, 0 if unassigned
  uint32 assigned_part_id = 9;    // part persistentId, 0 if unassigned
  int32  seat_index = 10;     // seat index within part
}

// --- Vessel ---

message Vessel {
  VesselStructure structure = 1;
  VesselState     state = 2;
  bytes           structure_hash = 3;  // hash of VesselStructure, empty in craft files
}

// --- Structure (static, changes only on dock/undock/stage) ---

message VesselStructure {
  repeated PartStructure parts = 1;
  string vessel_id = 2;       // GUID — identity, set at construction
  uint32 persistent_id = 3;   // numeric identity
}

message PartStructure {
  uint32 id = 1;              // index in craft, persistentId in save
  string part_name = 2;       // prefab lookup key
  int32  parent_index = 3;    // -1 for root
  Vec3   relative_pos = 4;    // position relative to root part (root = origin)
  Quat   relative_rot = 5;    // rotation relative to root part (root = identity)
  Attachment attachment = 6;  // null for root part
  Symmetry   symmetry = 7;    // null for non-symmetric parts
  // Only components with editor-configurable structure.
  // Prefab-only components (Engine, Rcs, etc.) are discovered from the prefab.
  TankVolumeStructure tank_volume = 8;
  BatteryStructure    battery = 9;
  DataStorageStructure data_storage = 10;
}

message Attachment {
  int32 parent_node_index = 1;  // attach node index on parent (-1 for surface)
  int32 child_node_index = 2;   // attach node index on this part (-1 for surface)
  Vec3  srf_attach_pos = 3;     // null for stack-attached
  Vec3  srf_attach_normal = 4;  // null for stack-attached
}

message Symmetry {
  repeated uint32 partners = 1;  // part indices of counterparts
  Vec3 mirror = 2;               // null = radial, flipped axis = mirror
}

message TankVolumeStructure {
  double volume = 1;
  repeated TankStructure tanks = 2;
  double max_rate = 3;            // shared in/out cap, proportioned across tanks
}

message TankStructure {
  string resource = 1;
  double capacity = 2;
}

message BatteryStructure {
  double capacity = 1;
}

// --- Science structure ---

message DataStorageStructure {
  int64 capacity_bytes = 1;
}

// --- State (dynamic, changes during flight or in editor) ---

message VesselState {
  FlightState flight = 1;     // null in craft files
  repeated PartState parts = 2;
  repeated Stage stages = 3;  // remaining stages, firing order. fire = pop.
  string name = 4;            // display name (renameable in flight)
  int32  vessel_type = 5;     // Ship, Station, Debris, etc.
  int32  situation = 6;        // Orbiting, Landed, Flying, SubOrbital, etc.
  double mission_time = 7;
  double launch_time = 8;
}

message Stage {
  repeated uint32 part_ids = 1;
}

message PartState {
  uint32 id = 1;
  // Only components with mutable runtime state.
  TankVolumeState     tank_volume    = 4;
  BatteryState        battery        = 5;
  bool                activated      = 6;  // Part.state == ACTIVE (engine staged, etc.)
  FuelCellState       fuel_cell      = 7;
  ReactionWheelState  reaction_wheel = 8;
  DataStorageState    data_storage   = 9;
  ThermometerState    thermometer    = 10;
}

message TankVolumeState {
  repeated double amounts = 1;  // one per tank, same order as structure
}

message BatteryState {
  double value = 1;
}

// Off-LP accumulator state — see Nova.Core/Components/Accumulator.cs.
// Capacity is component-derived (cfg-declared for fuel-cell manifolds,
// formula-derived inside ReactionWheel) and not persisted: it gets
// recomputed at OnBuildSolver time, so a cfg edit (e.g. retuning
// electricRate) takes effect on next vessel load.
message AccumulatorState {
  double contents = 1;
}

message FuelCellState {
  bool              is_active     = 1;
  bool              refill_active = 2;
  AccumulatorState lh2_manifold  = 3;
  AccumulatorState lox_manifold  = 4;
}

message ReactionWheelState {
  bool              refill_active = 1;
  AccumulatorState buffer        = 2;
}

// --- Science state ---

// One progressive observation record. Lives in a DataStorage. Two
// kinds, distinguished by which set of fields is populated:
//
//  Direct:      `recorded_*_alt_m`. The PartModule updates the recorded
//               altitude bounds each tick while loaded + active;
//               fidelity is derived from (recorded altitude span /
//               layer altitude span) and cached in `fidelity`.
//
//  Interpolated: `start_ut` + `end_ut`. No per-tick update needed —
//                fidelity at any time is
//                `clamp((min(now,end_ut) - start_ut) / (end_ut-start_ut), 0, 1)`.
//                Telemetry recomputes on emit; the cached `fidelity`
//                field is for save-file readers.
//
// Both kinds share the common fields. There is no "sealed" state — a
// file is created when observation starts and continues to update or
// interpolate until the player retrieves / transmits / discards it.
message ScienceFile {
  string subject_id    = 1;   // SubjectKey.ToString(), e.g. "lts@Kerbin:SrfLanded:7"
  string experiment_id = 2;   // "atm-profile", "lts", etc.
  double fidelity      = 3;   // [0,1] — cached snapshot, not the source of truth
  double produced_at   = 4;   // UT when this file was first created
  string instrument    = 5;   // Player-facing name of the instrument that produced it

  // Direct (atm-profile): altitude bounds the vessel has covered.
  // Fidelity span uses the layer's effective altitude range
  // (max(layer bottom, surface floor) → layer top), looked up from the
  // experiment's body table at compute-time.
  double recorded_min_alt_m        = 6;
  double recorded_max_alt_m        = 7;

  // Interpolated (lts): start UT (when file was created — may be
  // mid-slice if the player enabled the experiment late) and the UT
  // at which the slice ends (interpolation cap). `slice_duration`
  // gates the denominator: fidelity =
  // clamp((min(now, end_ut) - start_ut) / slice_duration, 0, 1).
  // Storing `slice_duration` on the file (rather than re-deriving
  // from body year at read time) makes the file self-contained for
  // offline tooling.
  double start_ut                  = 8;
  double end_ut                    = 9;
  double slice_duration_seconds    = 10;
}

message DataStorageState {
  repeated ScienceFile files = 1;
}

// Thermometer state. Body / situation / body-year are NOT here —
// they're vessel-level (VirtualVessel.BodyName/Situation/...), so a
// single source of truth for "where is this vessel" exists across all
// components.
message ThermometerState {
  // User-controlled enable flags. Default false — players opt each
  // experiment in via the SCI tab toggle. All other Thermometer state
  // is now stored on the ScienceFile records in DataStorage (live for
  // direct measurements, interpolated for LTS), so the component
  // itself is essentially stateless beyond the toggles.
  bool   atm_enabled            = 1;
  bool   lts_enabled            = 2;
}

// --- Flight state (only on in-flight vessels) ---

message FlightState {
  OrbitalState  orbit = 1;
  PositionState position = 2;
  uint32 action_groups = 3;   // bitfield: SAS, RCS, Lights, Gear, Brakes, customs
}

message OrbitalState {
  double inclination = 1;
  double eccentricity = 2;
  double semi_major_axis = 3;
  double lan = 4;
  double argument_of_periapsis = 5;
  double mean_anomaly_at_epoch = 6;
  double epoch = 7;
  int32  body_index = 8;
}

message PositionState {
  double latitude = 1;
  double longitude = 2;
  double altitude = 3;        // above sea level
  Quat   rotation = 4;        // surface-relative rotation (srfRelRotation)
  Vec3   velocity = 5;        // surface-relative, for flying/suborbital
  double height_above_terrain = 6;
  reserved 7, 8;              // world-space pos/rot — invalid across sessions
}
